<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Despesas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <a class="btn btn-link ps-0" th:href="@{/}">← Voltar</a>
    <h1 class="h3 mb-3">Lançamento de despesas mensais</h1>

    <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
        <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
    </div>

    <form th:action="@{/despesas}" th:object="${despesa}" method="post" class="row g-3 mb-4">
        <input type="hidden" th:field="*{id}">
        <div class="col-md-2">
            <label class="form-label">Tipo</label>
            <select th:field="*{tipo}" class="form-select" required>
                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Referência</label>
            <input type="date" th:field="*{referencia}" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Descrição</label>
            <input type="text" th:field="*{descricao}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Valor</label>
            <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Observação</label>
            <input type="text" th:field="*{observacao}" class="form-control">
        </div>
        <div class="col-md-1 d-grid align-items-end">
            <button class="btn btn-success" type="submit" th:text="${despesa.id == null ? 'Salvar' : 'Atualizar'}"></button>
        </div>
    </form>

    <div class="mb-3">
        <a class="btn btn-outline-secondary" th:href="@{/despesas/relatorios/mensal}">Relatório mensal de despesas</a>
    </div>

    <table class="table table-striped align-middle">
        <thead>
        <tr>
            <th>Referência</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Observação</th>
            <th class="text-end">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${despesas}">
            <td th:text="${item.referencia}"></td>
            <td th:text="${item.tipo}"></td>
            <td th:text="${item.descricao}"></td>
            <td th:text="${#numbers.formatDecimal(item.valor, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${item.observacao}"></td>
            <td class="text-end">
                <a class="btn btn-sm btn-outline-primary" th:href="@{'/despesas?editar=' + ${item.id}}">Editar</a>
                <form class="d-inline" th:action="@{'/despesas/' + ${item.id} + '/excluir'}" method="post">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
