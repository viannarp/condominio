<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moradores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <a class="btn btn-link ps-0" th:href="@{/}">← Voltar</a>
    <h1 class="h3 mb-3">Cadastro de moradores</h1>

    <form th:action="@{/moradores}" th:object="${morador}" method="post" class="row g-3 mb-4">
        <div class="col-md-5">
            <label class="form-label">Nome</label>
            <input type="text" th:field="*{nome}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Unidade</label>
            <input type="text" th:field="*{unidade}" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Telefone</label>
            <input type="text" th:field="*{telefone}" class="form-control">
        </div>
        <div class="col-md-1 d-grid align-items-end">
            <button class="btn btn-success" type="submit">Salvar</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nome</th>
            <th>Unidade</th>
            <th>Telefone</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${moradores}">
            <td th:text="${item.nome}"></td>
            <td th:text="${item.unidade}"></td>
            <td th:text="${item.telefone}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
