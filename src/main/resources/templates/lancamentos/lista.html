<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lançamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <a class="btn btn-link ps-0" th:href="@{/}">← Voltar</a>
    <h1 class="h3 mb-3">Lançamento de condomínio / cota extra</h1>

    <form th:action="@{/lancamentos}" th:object="${lancamento}" method="post" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Morador</label>
            <select name="moradorId" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="m : ${moradores}" th:value="${m.id}" th:text="${m.nome + ' - ' + m.unidade}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Tipo</label>
            <select th:field="*{tipo}" class="form-select">
                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Competência</label>
            <input type="date" th:field="*{competencia}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">Valor</label>
            <input type="number" step="0.01" th:field="*{valor}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">Descrição</label>
            <input type="text" th:field="*{descricao}" class="form-control">
        </div>
        <div class="col-md-1 d-grid align-items-end">
            <button class="btn btn-success" type="submit">Salvar</button>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Morador</th>
            <th>Tipo</th>
            <th>Competência</th>
            <th>Valor</th>
            <th>Descrição</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${lancamentos}">
            <td th:text="${item.morador.nome + ' - ' + item.morador.unidade}"></td>
            <td th:text="${item.tipo}"></td>
            <td th:text="${item.competencia}"></td>
            <td th:text="${#numbers.formatDecimal(item.valor, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${item.descricao}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
