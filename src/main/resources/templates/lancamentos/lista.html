<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lançamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <a class="btn btn-link ps-0" th:href="@{/}">← Voltar</a>
    <h1 class="h3 mb-3">Lançamentos de condomínio e cota extra</h1>

    <form th:action="@{/lancamentos}" th:object="${lancamento}" method="post" class="row g-3 mb-4">
        <input type="hidden" th:field="*{id}">
        <div class="col-md-3">
            <label class="form-label">Morador</label>
            <select name="moradorId" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="m : ${moradores}"
                        th:selected="${lancamento.morador != null and lancamento.morador.id == m.id}"
                        th:value="${m.id}" th:text="${m.nome + ' - ' + m.unidade}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Tipo</label>
            <select th:field="*{tipo}" class="form-select">
                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Competência</label>
            <input type="date" th:field="*{competencia}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Valor</label>
            <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Descrição</label>
            <input type="text" th:field="*{descricao}" class="form-control">
        </div>
        <div class="col-md-1 d-grid align-items-end">
            <button class="btn btn-success" type="submit" th:text="${lancamento.id == null ? 'Salvar' : 'Atualizar'}"></button>
        </div>
    </form>

    <table class="table table-striped align-middle">
        <thead>
        <tr>
            <th>Morador</th>
            <th>Tipo</th>
            <th>Competência</th>
            <th>Valor</th>
            <th>Total pago</th>
            <th>Saldo em aberto</th>
            <th>Status</th>
            <th class="text-end">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${resumos}">
            <td th:text="${item.lancamento.morador.nome + ' - ' + item.lancamento.morador.unidade}"></td>
            <td th:text="${item.lancamento.tipo}"></td>
            <td th:text="${item.lancamento.competencia}"></td>
            <td th:text="${#numbers.formatDecimal(item.lancamento.valor, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${#numbers.formatDecimal(item.totalPago, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${#numbers.formatDecimal(item.saldoAberto, 1, 'POINT', 2, 'COMMA')}"></td>
            <td>
                <span class="badge text-bg-success" th:if="${item.saldoAberto.compareTo(T(java.math.BigDecimal).ZERO) == 0}">Quitado</span>
                <span class="badge text-bg-warning" th:if="${item.saldoAberto.compareTo(T(java.math.BigDecimal).ZERO) > 0}">Em aberto</span>
            </td>
            <td class="text-end">
                <a class="btn btn-sm btn-outline-primary" th:href="@{'/lancamentos?editar=' + ${item.lancamento.id}}">Editar</a>
                <form class="d-inline" th:action="@{'/lancamentos/' + ${item.lancamento.id} + '/excluir'}" method="post">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
